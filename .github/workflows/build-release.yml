name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild test \
            -project OpenTypeless.xcodeproj \
            -scheme OpenTypeless \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

  build:
    name: Build ${{ matrix.arch }}
    needs: test
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Release app
        run: |
          xcodebuild build \
            -project OpenTypeless.xcodeproj \
            -scheme OpenTypeless \
            -configuration Release \
            -destination 'platform=macOS,arch=${{ matrix.arch }}' \
            -derivedDataPath "build/ci-${{ matrix.arch }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=${{ matrix.arch }}

      - name: Package app
        run: |
          set -euo pipefail

          app_path="build/ci-${{ matrix.arch }}/Build/Products/Release/OpenTypeless.app"
          artifact_name="OpenTypeless-macos-${{ matrix.arch }}.zip"
          mkdir -p dist

          test -d "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "dist/$artifact_name"
          shasum -a 256 "dist/$artifact_name" > "dist/$artifact_name.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenTypeless-macos-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "OpenTypeless $TAG_NAME" \
            --generate-notes \
            --verify-tag
