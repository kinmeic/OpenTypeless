name: OpenTypeless
options:
  developmentLanguage: en
schemes:
  OpenTypeless:
    build:
      targets:
        Typeless: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TypelessTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Typeless:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Typeless
    settings:
      base:
        PRODUCT_NAME: OpenTypeless
        PRODUCT_BUNDLE_IDENTIFIER: com.opentypeless.app
        INFOPLIST_FILE: Typeless/SupportingFiles/Info.plist
        CODE_SIGN_ENTITLEMENTS: Typeless/SupportingFiles/Typeless.entitlements
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Typeless/SupportingFiles/Typeless.entitlements
    info:
      path: Typeless/SupportingFiles/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "OpenTypeless needs microphone access to record your voice for speech-to-text."
        NSSpeechRecognitionUsageDescription: "OpenTypeless needs speech recognition access to convert your voice into text."
        NSUserNotificationAlertStyle: alert
    testTargets:
      - TypelessTests

  TypelessTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - TypelessTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.opentypeless.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenTypeless.app/Contents/MacOS/OpenTypeless"
    dependencies:
      - target: Typeless
